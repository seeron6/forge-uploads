<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>forge-uploads · preview</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"/>
<style>
  :root {
    --bg: #0a0a0a; --bg-1: #111; --bg-2: #161616; --line: #242424; --line-2: #2e2e2e;
    --ink: #f5f5f4; --ink-2: #d4d4d4; --ink-3: #a3a3a3; --ink-4: #737373;
    --forge: #ff6b1f; --acid: #b6ff3d; --steel: #6ea8ff; --ember: #ffb547; --rust: #c44a2a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Geist', system-ui, sans-serif; font-size: 13.5px; line-height: 1.5; height: 100%; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  .frame { display: grid; grid-template-rows: 36px 1fr; height: 100%; }
  .titlebar { display: flex; align-items: center; gap: 8px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: var(--bg-1);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-4); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3a3a; }
  .dot.live { background: var(--forge); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .panel { padding: 18px 22px; overflow: auto; }
  .badge { display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; padding: 2px 6px;
    border-radius: 4px; border: 1px solid var(--line-2); background: var(--bg-1); color: var(--ink-2); }
  .badge-acid { color: var(--acid); border-color: rgba(182,255,61,.3); background: rgba(182,255,61,.08); }
  .badge-rust { color: #e57b5f; border-color: rgba(196,74,42,.4); background: rgba(196,74,42,.08); }
  .badge-steel { color: var(--steel); border-color: rgba(110,168,255,.3); background: rgba(110,168,255,.08); }
  .btn { display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 6px 11px;
    border: 1px solid var(--line-2); background: var(--bg-1); border-radius: 6px; color: var(--ink); }
  .btn:hover { background: var(--bg-2); border-color: #3a3a3a; }
  .btn-primary { background: var(--forge); border-color: var(--forge); color: #0a0a0a; font-weight: 500; }
  .btn-primary:hover { background: #ff8a3d; }
  .row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
    padding: 10px 14px; border-top: 1px solid var(--line); }
  .row:first-child { border-top: 0; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-3); }
  input[type="text"], input[type="email"], input[type="search"], select, textarea {
    background: var(--bg-2); border: 1px solid var(--line-2); border-radius: 6px;
    color: var(--ink); padding: 7px 10px; font: inherit; outline: 0;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  }
  input:focus { border-color: var(--forge); }
</style>
</head>
<body>
<div class="frame">
  <div class="titlebar">
    <span class="dot live"></span>
    <span>forge-uploads</span>
    <span style="margin-left:auto">tus · multipart · scan</span>
  </div>
  <div class="panel">
    <div class="eyebrow" style="margin-bottom:14px">Drop files (or click to upload)</div>
    <label id="drop" for="files" style="display:block;border:2px dashed var(--line-2);border-radius:10px;padding:36px;text-align:center;color:var(--ink-3);background:var(--bg-1);margin-bottom:18px;cursor:pointer">
      drag files here<br><span class="mono" style="font-size:11px;color:var(--ink-5)">or click to browse</span>
    </label>
    <input id="files" type="file" multiple style="display:none"/>
    <div class="eyebrow" style="margin-bottom:8px">Uploads</div>
    <div id="ul" style="border:1px solid var(--line);border-radius:8px;min-height:80px"></div>
  </div>
</div>
<script>
  const drop = document.getElementById('drop'), inp = document.getElementById('files'), ul = document.getElementById('ul');
  let n = 1;
  function pretty(b){if(b<1024)return b+'B';if(b<1024*1024)return(b/1024).toFixed(1)+'KB';return(b/1024/1024).toFixed(1)+'MB';}
  function add(file){
    const i = n++;
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <span class="badge">#${String(i).padStart(3,'0')}</span>
      <span style="display:grid;gap:4px">
        <span style="color:var(--ink-2)">${file.name} <span class="mono" style="color:var(--ink-5)">${pretty(file.size)}</span></span>
        <div style="height:4px;background:var(--bg-2);border-radius:2px;overflow:hidden"><div class="bar" style="width:0%;height:100%;background:var(--forge);transition:width .3s"></div></div>
        <span class="status mono" style="font-size:11px;color:var(--ink-4)">queued · scanning</span>
      </span>
      <span></span>
    `;
    ul.prepend(div);
    let p = 0;
    const t = setInterval(() => {
      p += 8 + Math.random()*12;
      if (p >= 100){
        p = 100;
        clearInterval(t);
        div.querySelector('.status').innerHTML = '<span style="color:var(--acid)">✓ uploaded · scan clean · signed</span>';
      } else {
        div.querySelector('.status').textContent = `uploading · ${p.toFixed(0)}%`;
      }
      div.querySelector('.bar').style.width = p + '%';
    }, 220);
  }
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor = 'var(--forge)'; });
  drop.addEventListener('dragleave', () => drop.style.borderColor = 'var(--line-2)');
  drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor = 'var(--line-2)'; [...e.dataTransfer.files].forEach(add); });
  inp.addEventListener('change', e => { [...e.target.files].forEach(add); });
  // Seed one
  add(new File([new Uint8Array(1024*842)], 'screenshot-2026-04-30.png'));
</script>
</body></html>
